replicaCount: 1

image:
  repository: your-registry/your-image
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 5000

app:
  env:
    FLASK_ENV: production
    FLASK_DEBUG: "0"
  databaseUrl: mysql+pymysql://app_user:strongpassword@flaskdocker-mysql:3306/app_prod

mysql:
  enabled: true
  image:
    repository: mysql
    tag: "8.4"
    pullPolicy: IfNotPresent
  auth:
    database: app_prod
    username: app_user
    password: strongpassword
    rootPassword: verystrongrootpassword
  persistence:
    enabled: true
    size: 8Gi
    accessModes:
      - ReadWriteOnce
    storageClass: ""
