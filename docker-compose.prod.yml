version: "3.8"

services:
  web:
    build: .
    # command: ["gunicorn", "-b", "0.0.0.0:5000", "wsgi:app"]
    ports:
      - "5000:5000"
    environment:
      FLASK_ENV: production
      DATABASE_URL: mysql+pymysql://app_user:strongpassword@db:3306/app_prod

    depends_on:
      - db

  db:
    environment:
      MYSQL_DATABASE: app_prod
      MYSQL_USER: app_user
      MYSQL_PASSWORD: strongpassword
      MYSQL_ROOT_PASSWORD: verystrongrootpassword

    volumes:
      - mysql_prod_data:/var/lib/mysql

volumes:
  mysql_prod_data:

# by default we use dockerfile's CMD ["gunicorn", "-b", "0.0.0.0:5000", "wsgi:app"] in production, but for development we override it with python3 -m app.main in docker-compose.dev.yml
