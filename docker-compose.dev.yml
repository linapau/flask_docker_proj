version: "3.8"

services:
  web:
    build: .
    command: python3 -m app.main
    ports:
      - "5000:5000"

    environment:
      FLASK_ENV: development
      FLASK_DEBUG: 1
      DATABASE_URL: mysql+pymysql://app_user:app_password@db:3306/app_dev

    volumes:
      - .:/app

    depends_on:
      - db

  db:
    environment:
      MYSQL_DATABASE: app_dev
      MYSQL_USER: app_user
      MYSQL_PASSWORD: app_password
      MYSQL_ROOT_PASSWORD: rootpassword

    volumes:
      - mysql_dev_data:/var/lib/mysql

volumes:
  mysql_dev_data: